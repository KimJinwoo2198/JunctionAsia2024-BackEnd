version: '3.8'

services:
  # Django 애플리케이션
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: junction_backend
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_NAME=${POSTGRES_NAME:-junction_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - MONGODB_URI=mongodb://mongo:27017
      - VISION_PROVIDER=${VISION_PROVIDER:-lora}
      - OLLAMA_BASE_URL=${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_VISION_MODEL=${OLLAMA_VISION_MODEL:-gemma4:e4b}
      - OLLAMA_RAG_MODEL=${OLLAMA_RAG_MODEL:-gemma4:e4b}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-bge-m3}
      - OLLAMA_TIMEOUT_SECONDS=${OLLAMA_TIMEOUT_SECONDS:-120}
      - LOCAL_VLM_MODEL_ID=${LOCAL_VLM_MODEL_ID:-google/gemma-4-E4B}
      - LOCAL_VLM_ADAPTER_DIR=/app/vlm_lora_adapter
      - LOCAL_VLM_MAX_NEW_TOKENS=${LOCAL_VLM_MAX_NEW_TOKENS:-160}
      - LOCAL_VLM_TORCH_DTYPE=${LOCAL_VLM_TORCH_DTYPE:-bfloat16}
      - LOCAL_VLM_DEVICE_MAP=${LOCAL_VLM_DEVICE_MAP:-auto}
      - LOCAL_VLM_REQUIRE_CUDA=${LOCAL_VLM_REQUIRE_CUDA:-true}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-1}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-300}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    gpus: all
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./nutrition_pdfs:/app/nutrition_pdfs
      - ./nutrition_index:/app/nutrition_index
      - ./nutrition_index_chroma:/app/nutrition_index_chroma
      - ./vlm_lora_training/outputs/gemma4-e4b-food-lora-1000step:/app/vlm_lora_adapter:ro
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - junction_network
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 8000)); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL 데이터베이스
  db:
    image: postgres:16-alpine
    container_name: junction_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_NAME:-junction_db}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - junction_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB
  mongo:
    image: mongo:7.0
    container_name: junction_mongo
    restart: unless-stopped
    environment:
      - MONGO_INITDB_DATABASE=${MONGODB_NAME:-junction_db}
    volumes:
      - mongo_data:/data/db
    networks:
      - junction_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local

networks:
  junction_network:
    driver: bridge

